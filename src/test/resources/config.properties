# ════════════════════════════════════════════════════════════
#  Asirvad OGL Automation — Appium Capabilities Configuration
#  File: src/test/resources/config.properties
#
#  HOW TO USE:
#  1. Connect your Android device (USB debugging ON) or start an emulator.
#  2. Run `adb devices` to confirm device is listed.
#  3. Update values below and save.
#  4. Run:  mvn test  (or right-click testng.xml → Run As TestNG Suite)
# ════════════════════════════════════════════════════════════

# ── Appium Server ────────────────────────────────────────────
# Default: http://127.0.0.1:4723
# Change port if your Appium server uses a different one.
appium.url=http://127.0.0.1:4723

# ── Device / Emulator ────────────────────────────────────────
# device.name  : Friendly name (shown in `adb devices` output or AVD Manager)
# device.udid  : Leave empty when only ONE device is connected
device.name=Android Emulator
device.udid=

# ── Android Platform ─────────────────────────────────────────
platform.version=14.0

# ── Application ──────────────────────────────────────────────
# appPackage  : Found via `adb shell pm list packages | grep asirvad`
# appActivity : Found via `adb shell dumpsys window | grep -E 'mCurrentFocus|mFocusedApp'`
app.package=com.asirvadogl
app.activity=com.asirvadogl.ui.splash.SplashActivity

# ── Session Behaviour ────────────────────────────────────────
# no.reset=true  → Preserves app data between tests (faster; stay logged in)
# no.reset=false → Clears app data before each session (fresh state)
no.reset=true

# ── Wait Settings ────────────────────────────────────────────
# Keep implicit.wait.seconds=0 so WebDriverWait controls all synchronisation.
# Setting both implicit and explicit waits causes unpredictable stacking.
implicit.wait.seconds=0
